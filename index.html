<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aether Focus</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090b12;
        --text: #f4f7fb;
        --muted: #aab5c5;
        --line: #273244;
        --accent: #9fd3ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: radial-gradient(circle at 18% 0%, #18243a 0, transparent 32rem), var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
      }

      main {
        width: min(52rem, calc(100% - 2rem));
        margin: 0 auto;
        padding: 4rem 0;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2.25rem, 8vw, 4.5rem);
        line-height: 1.15;
      }

      p {
        color: var(--muted);
        max-width: 42rem;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        border-top: 1px solid var(--line);
        margin-top: 2rem;
        padding-top: 1.5rem;
      }

      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Aether Focus</h1>
      <p>
        Aether Focus is a paid focus app for study and deep work, with optional NFC Anchor setup
        and constellation-style focus history.
      </p>
      <nav>
        <a href="privacy.html">Privacy Policy</a>
        <a href="support.html">Support</a>
      </nav>
    </main>
  </body>
</html>
